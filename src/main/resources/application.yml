# AXPORTAL BACKEND 프로젝트 설정

# 서버 설정
server:
  port: 8080
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# Spring 설정
spring:
  application:
    name: axportal-backend
  
  # 프로파일 설정
  profiles:
    active: dev
  
  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        use_sql_comments: true
    defer-datasource-initialization: true
  
  # 데이터베이스 설정 (H2 - 개발환경)
  datasource:
    url: jdbc:h2:mem:axportal;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  # H2 콘솔 설정
  h2:
    console:
      enabled: true
      path: /h2-console
  
  # SQL 초기화
  sql:
    init:
      mode: always

# SKT AI 외부 API 설정
sktai:
  api:
    base-url: https://aip-stg.sktai.io
    client-id: default
    client-secret: ${SKTAI_CLIENT_SECRET:}
    timeout:
      connect: 5000  # 연결 타임아웃 (밀리초)
      read: 30000    # 읽기 타임아웃 (밀리초)
      data-locations: classpath:data.sql
  
  # Jackson 설정
  jackson:
    time-zone: Asia/Seoul
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false
  
  # Security 설정
  security:
    user:
      name: admin
      password: admin123
      roles: ADMIN

# MyBatis 설정
mybatis:
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 30
  mapper-locations: classpath:mapper/**/*.xml

# 로깅 설정
logging:
  level:
    com.skax.aiportal: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Actuator 설정
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# OpenAPI 문서 설정
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
    groups-order: DESC
    operationsSorter: method
    disable-swagger-default-url: true
    use-root-path: true
